<!DOCTYPE html>
<html>
<head>

<title>Military Command Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/military.css">

</head>

<body>

<nav class="navbar navbar-dark military-nav">
<div class="container-fluid">
<h4>AI Border Defence Command Center</h4>
</div>
</nav>

<div class="container-fluid mt-3">

<div class="row">

<div class="col-md-3">
<div class="card military-card">
<div class="card-body">
<h5>Total Alerts</h5>
<h2 id="alerts">0</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card military-card">
<div class="card-body">
<h5>High Risk Zones</h5>
<h2>12</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card military-card">
<div class="card-body">
<h5>Active Cameras</h5>
<h2>8</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card military-card">
<div class="card-body">
<h5>Threat Level</h5>
<h2 class="text-danger">HIGH</h2>
</div>
</div>
</div>

</div>

<div class="row mt-4">

<div class="col-md-8">
<div class="card military-card">
<div class="card-body">
<h5>Live Surveillance</h5>
<video width="100%" controls>
<source src="" type="video/mp4">
</video>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card military-card">
<div class="card-body">
<h5>Live Alerts</h5>
<div id="alerts-list"></div>
</div>
</div>
</div>

</div>

</div>

<script>

fetch("/get_alerts")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(i=>{

html+=`
<div class="alert alert-danger">
${i[1]} - ${i[2]}
</div>
`

})

document.getElementById("alerts-list").innerHTML=html

document.getElementById("alerts").innerHTML=data.length

})

</script>

</body>
</html>
