<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">

</head>

<body class="bg-dark text-light">

<div class="container">

<h2>Dashboard</h2>

<button onclick="load()" class="btn btn-primary">Load Alerts</button>

<div id="data"></div>

</div>

<script>

function load(){

fetch("/get_alerts")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(i=>{

html+=`
<div class="card bg-secondary text-light m-2">
<div class="card-body">
${i[1]} - ${i[2]} - ${i[3]}
</div>
</div>
`

})

document.getElementById("data").innerHTML=html

})

}

</script>

</body>
</html>
